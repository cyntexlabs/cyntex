# CLI smoke fixture: a pipeline that parses the payload (js) and appends to MySQL.
version: cyntex/v1
kind: pipeline
id: kfk2my
source: src_kfk
settings: { start_from: earliest }   # stream consume position (pipeline-level, read amendment §1)
transforms:
  - id: parse
    from: [orders_topic]
    type: js
    script: |
      function process(record, ctx) { record.after = JSON.parse(record.after.value); return record; }
serve:
  from: parse
  sync:
    - { id: my, source: tgt_my, write_mode: append }
