# Local development MongoDB with TLS for the Cyntex server.
#
# The same single-node replica-set as docker-compose.yml, but mongod requires TLS. Store TLS is
# opt-in (the default store connection is plaintext); this profile exists to exercise a TLS store
# connection, so the local set speaks TLS. It presents the self-signed chain generated by ./tls/gen-certs.sh
# (CN=localhost, SAN localhost/127.0.0.1); the server also trusts that CA but does not require a
# client certificate. The healthcheck initiates the set over TLS on first start.
#
# Bring it up with:
#   ./tls/gen-certs.sh
#   docker compose -f docker-compose.tls.yml up
# then point the server at it (TLS is opt-in, so ask for it with ssl=true):
#   cyntex.store.mongo.uri=mongodb://localhost:27017/cyntex?replicaSet=rs0&ssl=true
#   cyntex.store.mongo.tls-ca-file=deploy/local-mongo/tls/ca.pem
#
# Development only; not the production deployment.
services:
  mongo:
    image: mongo:7.0
    container_name: cyntex-mongo-rs-tls
    command:
      - "--replSet"
      - "rs0"
      - "--bind_ip_all"
      - "--tlsMode"
      - "requireTLS"
      - "--tlsCertificateKeyFile"
      - "/etc/mongo/tls/server.pem"
      - "--tlsCAFile"
      - "/etc/mongo/tls/ca.pem"
      - "--tlsAllowConnectionsWithoutCertificates"
    ports:
      - "27017:27017"
    healthcheck:
      test: >
        mongosh --quiet --tls --tlsCAFile /etc/mongo/tls/ca.pem --host localhost --eval
        "try { rs.status().ok } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }).ok }"
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 3s
    volumes:
      - cyntex-mongo-tls-data:/data/db
      - ./tls:/etc/mongo/tls:ro

volumes:
  cyntex-mongo-tls-data:
