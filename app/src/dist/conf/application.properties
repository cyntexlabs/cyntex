# Cyntex server external configuration.
#
# Files in this directory override the defaults baked into the fat-jar; the launcher adds this
# directory to the Spring configuration search path. Uncomment and edit to override; environment
# variables (e.g. CYNTEX_STORE_MONGO_URI) override these in turn (build once, run anywhere).

# Store (MongoDB) connection. A single-node replica-set is required (the checkpoint compare-and-swap
# runs in a multi-document transaction). Defaults target a local replica-set.
# cyntex.store.mongo.enabled=true
# cyntex.store.mongo.uri=mongodb://localhost:27017/cyntex?replicaSet=rs0
# cyntex.store.mongo.tls=false
# cyntex.store.mongo.server-selection-timeout=5s

# Operational logging: the operator-facing diagnostic stream (console + a rolling file), distinct
# from the coded error-code system that surfaces user-facing errors. The launcher runs from the
# installation directory, so the default logs/ lands under the install home (a bare `java -jar`
# writes it relative to its own working directory). The window is bounded and size-and-time-rolled.
# cyntex.log.dir=logs
# cyntex.log.name=cyntex-server
# cyntex.log.max-file-size=50MB
# cyntex.log.max-history=14
# cyntex.log.total-size-cap=1GB
# Log levels use Spring Boot's own keys, e.g.:
# logging.level.root=INFO
# logging.level.io.cyntex=INFO

# Embedded Hazelcast member (one full member per process; all join discovery is off and the listen
# socket is loopback-only, so the member neither finds nor is reachable by others — the cluster
# name is a second fence against accidental merges). The Jet execution engine is always enabled;
# the cooperative worker pool defaults to the CPU core count and can be lowered on shared hosts.
# cyntex.hz.cluster-name=cyntex
# cyntex.hz.jet.cooperative-thread-count=
