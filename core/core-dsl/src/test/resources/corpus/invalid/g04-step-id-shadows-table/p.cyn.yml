# Invalid: the step is named 'orders', which is also a table in src_a — a bare from: [orders]
# could no longer tell the step's output apart from the source table (ADR-0016 §5, no shadowing).
# Rename the step (e.g. live_orders) and the batch is valid.
version: cyntex/v1
kind: pipeline
id: p
source: src_a
transforms:
  - { id: orders, from: [orders], type: filter, expr: "op != 'd'" }
serve:
  from: orders
  sync:
    - { id: out, source: src_a }
