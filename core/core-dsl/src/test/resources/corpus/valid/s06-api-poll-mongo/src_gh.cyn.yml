# ADR-0016 §14.6 — GitHub API polling -> MongoDB (api mode).
# tables[].name = API resource = logical stream name (X12); pk = upsert key (§4).
version: cyntex/v1
kind: source
id: src_gh
connector: quickapi
config: { base_url: "https://api.github.com", token: ghp_a1b2c3d4 }
mode: api
tables:
  - { name: issues, pk: [id] }
  - { name: pulls,  pk: [id] }
options: { poll_interval: 5m, cursor: updated_at }
