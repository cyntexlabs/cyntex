# map: unlisted fields pass through, new columns flow automatically; op:ddl bypasses the
# projection (no-op passthrough, X15). Sink applies DDL explicitly (default is fail, X5).
version: cyntex/v1
kind: pipeline
id: ddl_chain
source: src_hr
transforms:
  - id: norm
    from: [employees]
    type: map
    fields: { emp_id: $id }
view:
  id: emp_mirror
  from: norm
  primary_key: emp_id
  storage: { warm: { collection: emp_mirror } }
  schema: { enforce: true, evolution: additive }
serve:
  from: emp_mirror
  sync:
    - { id: dw, source: tgt_dw, write_mode: upsert, ddl: apply }
